<!-- Structure principale -->
<div class="min-h-screen bg-gray-50">

  <!-- SIDEBAR (PARTIE GAUCHE) -->
  <aside
    [class.w-64]="!isSidebarCollapsed"
    [class.w-20]="isSidebarCollapsed"
    class="fixed left-0 top-0 h-full bg-gradient-to-b from-gray-900 to-gray-800
           text-white transition-all duration-300 z-30 shadow-2xl"
  >
    <!-- Logo et titre -->
    <div class="flex items-center justify-between p-4 border-b border-gray-700">
      <div class="flex items-center gap-3 overflow-hidden">
        <i class="fas fa-chalkboard-user text-2xl text-blue-400"></i>
        <span *ngIf="!isSidebarCollapsed" class="font-bold text-lg whitespace-nowrap">
          Gestion Formation
        </span>
      </div>
      <button
        (click)="toggleSidebar()"
        class="p-1 rounded-lg hover:bg-gray-700 transition"
      >
        <i [class.fa-chevron-left]="!isSidebarCollapsed"
           [class.fa-chevron-right]="isSidebarCollapsed"
           class="fas text-sm"></i>
      </button>
    </div>

    <!-- Menu de navigation -->
    <nav class="flex-1 py-6">
      <ul class="space-y-1">
        @for (item of visibleMenuItems; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="bg-blue-600/20 border-l-4 border-blue-500"
              class="flex items-center gap-3 px-4 py-3 text-gray-300
                     hover:bg-gray-700/50 hover:text-white transition-all
                     group cursor-pointer"
              [class.justify-center]="isSidebarCollapsed"
            >
              <i [class]="item.icon + ' text-lg w-5'"></i>
              <span *ngIf="!isSidebarCollapsed" class="text-sm font-medium">
                {{ item.label }}
              </span>
              <div *ngIf="isSidebarCollapsed"
                   class="absolute left-full ml-2 px-2 py-1 bg-gray-900 text-white
                          text-xs rounded opacity-0 group-hover:opacity-100
                          transition pointer-events-none whitespace-nowrap z-50">
                {{ item.label }}
              </div>
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- Footer sidebar -->
    <div class="border-t border-gray-700 p-4">
      <div class="flex items-center gap-3" [class.justify-center]="isSidebarCollapsed">
        <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center">
          <i [class]="getRoleIcon()" class="text-white text-sm"></i>
        </div>
        <div *ngIf="!isSidebarCollapsed" class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate">{{ user?.login }}</p>
          <p class="text-xs text-gray-400 truncate">{{ user?.role }}</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- CONTENU PRINCIPAL -->
  <div [class.ml-64]="!isSidebarCollapsed"
       [class.ml-20]="isSidebarCollapsed"
       class="transition-all duration-300 min-h-screen">

    <!-- NAVBAR SUPÉRIEURE (PARTIE EN HAUT) -->
    <header class="bg-white shadow-sm sticky top-0 z-20">
      <div class="px-6 py-4 flex items-center justify-between">

        <!-- Bouton menu mobile -->
        <button
          (click)="toggleMobileMenu()"
          class="lg:hidden p-2 rounded-lg hover:bg-gray-100 transition"
        >
          <i class="fas fa-bars text-gray-600 text-xl"></i>
        </button>

        <!-- Titre de la page (optionnel) -->
        <div class="flex-1">
          <h1 class="text-xl font-semibold text-gray-800">
            {{ getPageTitle() }}
          </h1>
        </div>

        <!-- Actions utilisateur -->
        <div class="flex items-center gap-4">



          <!-- Menu utilisateur -->
          <div class="relative">
            <button
              (click)="toggleUserMenu()"
              class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100 transition"
            >
              <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-blue-600
                          flex items-center justify-center text-white">
                <i [class]="getRoleIcon()" class="text-sm"></i>
              </div>
              <div class="hidden md:block text-left">
                <p class="text-sm font-medium text-gray-700">{{ user?.login }}</p>
                <p class="text-xs text-gray-500">{{ user?.role }}</p>
              </div>
              <i class="fas fa-chevron-down text-gray-400 text-xs hidden md:block"></i>
            </button>

            <!-- Dropdown menu -->
            @if (isUserMenuOpen) {
              <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg
                          border border-gray-100 py-2 z-50">
                <a routerLink="/profile"
                   class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700
                          hover:bg-gray-50 transition">
                  <i class="fas fa-user text-gray-400"></i>
                  Mon profil
                </a>
                <a routerLink="/settings"
                   class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700
                          hover:bg-gray-50 transition">
                  <i class="fas fa-cog text-gray-400"></i>
                  Paramètres
                </a>
                <hr class="my-1">
                <button
                  (click)="logout()"
                  class="w-full flex items-center gap-3 px-4 py-2 text-sm text-red-600
                         hover:bg-red-50 transition">
                  <i class="fas fa-sign-out-alt"></i>
                  Déconnexion
                </button>
              </div>
            }
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENU PRINCIPAL AVEC ROUTER-OUTLET -->
    <main class="p-6">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Overlay mobile -->
  @if (isMobileMenuOpen) {
    <div
      (click)="toggleMobileMenu()"
      class="fixed inset-0 bg-black/50 z-25 lg:hidden"
    ></div>
  }
</div>
